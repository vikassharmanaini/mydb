name: mydb
description: DBStudio — cross-platform database management (Flutter desktop).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.18.0
  csv: ^6.0.0
  dartssh2: ^2.9.0
  drift: ^2.18.0
  excel: ^4.0.0
  file_picker: ^8.0.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  go_router: ^14.2.0
  highlight: ^0.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  logger: ^2.3.0
  mysql_client: ^0.0.27
  path: ^1.9.0
  path_provider: ^2.1.3
  postgres: ^3.1.0
  re_editor: ^0.3.0
  riverpod_annotation: ^2.3.5
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.0
  uuid: ^4.4.0
  window_manager: ^0.3.8
  re_highlight: ^0.0.3

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
